<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Button</title>
    <link rel="stylesheet" href="spectrum.css">
    <link rel="stylesheet" href="app.css">
  </head>
  <body class="spectrum spectrum--medium spectrum--light">
    <main class="app-shell">
      <section class="app-stage" aria-label="Login Button side panel">
        <section id="setupView" class="view view--setup" hidden aria-label="ZIP.KEY setup view">
          <div class="surface surface--setup">
            <input id="zipKeyFileInput" class="zip-key-file-input" type="file" accept=".key,.json,.txt,.inc" hidden>

            <div id="zipKeyDropSurface" class="zip-key-dropSurface" aria-describedby="zipKeyStatus">
              <div class="zip-key-dropSurfaceCopy">
                <p class="spectrum-Heading spectrum-Heading--sizeXL">LOAD KEY</p>
              </div>

              <button
                id="zipKeyBrowseButton"
                class="spectrum-Button spectrum-Button--outline spectrum-Button--primary spectrum-Button--sizeL"
                type="button"
              >
                <span class="spectrum-Button-label">CHOOSE KEY</span>
              </button>
            </div>

            <p id="zipKeyStatus" class="spectrum-Body spectrum-Body--sizeM zip-key-status">
              Drop key.
            </p>
          </div>
        </section>

        <section id="loggedOutView" class="view view--logged-out" hidden aria-label="Unauthenticated view">
          <div class="surface surface--cta">
            <button
              id="loginButton"
              class="spectrum-Button spectrum-Button--fill spectrum-Button--accent spectrum-Button--sizeXL login-button"
              type="button"
            >
              <span id="loginButtonLabel" class="spectrum-Button-label">SIGN IN</span>
            </button>
          </div>
        </section>

        <section
          id="authenticatedView"
          class="view view--authenticated spectrum-Typography"
          hidden
          aria-label="Authenticated view"
        >
          <header class="surface surface--hero">
            <div class="hero-header">
              <div class="identity-row">
                <button
                  id="avatarMenuButton"
                  class="avatar-menuButton"
                  type="button"
                  aria-haspopup="menu"
                  aria-expanded="false"
                  aria-controls="avatarMenu"
                >
                  <div id="avatarContainer" class="spectrum-Avatar spectrum-Avatar--size700 profile-avatar">
                    <img id="avatarImage" class="spectrum-Avatar-image" alt="Adobe avatar" hidden>
                    <div id="avatarFallback" class="profile-avatarFallback" aria-hidden="true">?</div>
                  </div>
                </button>

                <div class="identity-copy">
                  <a
                    id="displayNameLink"
                    class="spectrum-Heading spectrum-Heading--sizeXL profile-name profile-nameLink"
                    href="http://experience.adobe.com"
                    target="_blank"
                    rel="noreferrer"
                  >
                    Not signed in
                  </a>
                  <p id="displayEmail" class="profile-email profile-email--hidden">Not signed in</p>
                </div>
              </div>

              <div id="themeControl" class="theme-control">
                <button
                  id="themePickerButton"
                  class="theme-pickerButton"
                  type="button"
                  aria-haspopup="dialog"
                  aria-expanded="false"
                  aria-controls="themePickerPopover"
                  aria-label="Open theme picker"
                >
                  <span id="themePickerButtonSwatch" class="theme-pickerButtonSwatch" aria-hidden="true"></span>
                </button>

                <div id="themePickerPopover" class="surface theme-pickerPopover" role="dialog" aria-label="Theme picker" hidden>
                  <div id="themeSwatchGrid" class="theme-pickerGrid" role="listbox" aria-label="Spectrum color palette"></div>
                </div>
              </div>

              <div id="avatarMenu" class="surface avatar-menu" hidden>
                <div class="avatar-menuCopy">
                  <p class="spectrum-Detail spectrum-Detail--sizeM">Org</p>
                  <p id="selectedOrganizationName" class="spectrum-Heading spectrum-Heading--sizeL hero-orgName">
                    Awaiting session
                  </p>
                  <p id="selectedOrganizationMeta" class="spectrum-Body spectrum-Body--sizeS hero-orgMeta">
                    Not signed in.
                  </p>
                </div>

                <div class="avatar-menuMeta">
                  <div class="meta-item">
                    <p class="spectrum-Detail spectrum-Detail--sizeM">Build</p>
                    <p id="buildBadge" class="spectrum-Body spectrum-Body--sizeM">0.0.0</p>
                  </div>

                  <div class="meta-item meta-item--wide">
                    <p class="spectrum-Detail spectrum-Detail--sizeM">Status</p>
                    <p id="statusBanner" class="spectrum-Body spectrum-Body--sizeM">Loading extension state…</p>
                  </div>
                </div>

                <div class="avatar-menuActions">
                  <button
                    id="loadZipKeyButton"
                    class="spectrum-Button spectrum-Button--outline spectrum-Button--primary spectrum-Button--sizeM"
                    type="button"
                  >
                    <span class="spectrum-Button-label">LOAD KEY</span>
                  </button>

                  <button
                    id="logoutButton"
                    class="spectrum-Button spectrum-Button--outline spectrum-Button--primary spectrum-Button--sizeM"
                    type="button"
                  >
                    <span class="spectrum-Button-label">LOGOUT</span>
                  </button>
                </div>
              </div>
            </div>
          </header>
        </section>
      </section>

      <section id="debugConsole" class="surface surface--debug" aria-label="Debug info">
        <div class="debug-header">
          <button
            id="debugToggleButton"
            class="debug-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="debugConsoleBody"
          >
            <span class="debug-toggleHeading">
              <span id="debugToggleButtonLabel" class="spectrum-Detail spectrum-Detail--sizeL debug-toggleTitle">
                DEBUG INFO
              </span>
              <span id="debugToggleButtonMeta" class="spectrum-Body spectrum-Body--sizeS debug-toggleSubtitle">
                Click copies. Shift+click toggles details.
              </span>
            </span>
            <span
              id="debugToggleStatus"
              class="spectrum-Detail spectrum-Detail--sizeS debug-toggleStatus"
              hidden
            >
              Copied to clipboard
            </span>
            <span id="debugToggleIcon" class="debug-toggleIcon" aria-hidden="true">▼</span>
          </button>
        </div>

        <div id="debugConsoleBody" class="debug-body">
          <div class="spectrum-Textfield spectrum-Textfield--sizeM spectrum-Textfield--multiline is-readOnly debug-field">
            <textarea id="logOutput" class="spectrum-Textfield-input" readonly spellcheck="false"></textarea>
          </div>
        </div>
      </section>
    </main>

    <div id="zipKeyDropOverlay" class="zip-key-dropOverlay" hidden aria-hidden="true">
      <div class="zip-key-dropOverlayCard">
        <p class="spectrum-Heading spectrum-Heading--sizeXL">Drop ZIP.KEY to configure Login Button</p>
        <p class="spectrum-Body spectrum-Body--sizeM">Replacing the client will return this app to the sign-in view.</p>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
